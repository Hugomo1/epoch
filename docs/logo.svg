<svg width="800" height="300" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="scanGradient" x1="0%" y1="0%" x2="100%" y2="0%" spreadMethod="pad">
      <stop offset="0%" stop-color="#484F58"/>
      <stop offset="20%" stop-color="#484F58"/>
      <stop offset="50%" stop-color="#707d8e"/>
      <stop offset="60%" stop-color="#484F58"/>
      <stop offset="100%" stop-color="#484F58"/>
      <animate attributeName="x1" values="-1; 1; 1" keyTimes="0; 0.6; 1" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0; 2; 2" keyTimes="0; 0.6; 1" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes breathe {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .ascii-text { 
      font-family: &apos;Courier New&apos;, monospace; 
      font-size: 45px; 
      white-space: pre;
      font-weight: bold;
      animation: breathe 4s infinite ease-in-out;
    }
    .highlight { fill: url(#scanGradient); filter: url(#glow); }
  </style>
  <text x="400" y="-10" text-anchor="middle" dominant-baseline="middle" class="ascii-text highlight">
    <tspan x="400" dy="-1.2em">░░░░░░░░░░░░░░░░░░░░░</tspan>
    <tspan x="400" dy="-0.21em">░█▀▀░█▀█░█▀█░█▀▀░█░█░</tspan>
    <tspan x="400" dy="-0.21em">░█▀▀░█▀▀░█░█░█░░░█▀█░</tspan>
    <tspan x="400" dy="-0.21em">░▀▀▀░▀░░░▀▀▀░▀▀▀░▀░▀░</tspan>
    <tspan x="400" dy="-0.21em">░░░░░░░░░░░░░░░░░░░░░</tspan>
  </text>
</svg>
